<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeXa – Chat</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0e8f5;
    }
  </style>
</head>

<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="NeXa Logo">
      <span class="logo-text">NeXa</span>
    </div>

    <ul class="nav">
      <li class="nav-item" onclick="window.location.href='/main'">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
        Home
      </li>
      <li class="nav-item active" onclick="window.location.href='/chat'">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        New Chat
      </li>
      <li class="nav-item" onclick="window.location.href='/project'">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <rect x="4" y="2" width="16" height="20" rx="2"/>
          <line x1="8" y1="6" x2="16" y2="6"/>
          <line x1="8" y1="10" x2="16" y2="10"/>
          <line x1="8" y1="14" x2="12" y2="14"/>
        </svg>
        Project
      </li>
      <li class="nav-item" onclick="window.location.href='/recent'">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        Recent
      </li>
    </ul>
    
    <!-- Recent Chats Sidebar List -->
    <div class="recent-sidebar" style="margin-top: 1.5rem; flex: 1; display: flex; flex-direction: column; overflow: hidden; border-top: 1px solid rgba(168,85,247,0.1); padding-top: 1rem;">
      <span style="font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.5rem;">Recent Chats</span>
      <div id="sidebarRecentList" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.4rem; padding-right: 0.2rem;">
        <!-- Loaded via JS -->
      </div>
    </div>
    
    <div class="profile" style="display: flex; flex-direction: column; align-items: flex-start; gap: 0.25rem;">
      <span class="profile-label" style="font-size: 0.8rem; color: var(--text-muted);">Profile</span>
      <div style="display: flex; align-items: center; gap: 0.5rem; width: 100%;">
        <div class="avatar">
          <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="36" fill="#f472b6"/>
            <circle cx="18" cy="14" r="7" fill="white" fill-opacity=".9"/>
            <path d="M4 34c0-7.732 6.268-14 14-14s14 6.268 14 14" fill="white" fill-opacity=".9"/>
          </svg>
        </div>
        <span class="profile-email" style="font-weight: 600; font-size: 0.8rem; color: var(--text-dark); word-break: break-all; max-width: 130px;" title="{{ session.get('user_email', 'Guest') }}">{{ session.get('user_email', 'Guest') }}</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Menu"><i class="fas fa-bars"></i></button>
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="NeXa Logo" style="width: 38px; height: 38px; border-radius: 9px; object-fit: cover;">
        <div>
          <div class="greeting-title" id="dynamicGreeting">Good Morning 🌸</div>
          <div class="greeting-sub">Ready to make today productive?</div>
        </div>
      </div>

      <div class="topbar-right" style="display: flex; align-items: center; gap: 1rem;">
        <div class="mood-badge">
          <div class="mood-orb" id="mood-orb"></div>
          <span id="mood-text">Ready</span>
        </div>
        <button class="logout-btn" onclick="window.location.href='/logout'" style="margin-left: 1rem;">
          <svg viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chat-area">
      <!-- Welcoming Robot & Title -->
      <div id="welcome-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: var(--text-muted); opacity: 0.85; margin: auto;">
        <img src="{{ url_for('static', filename='images/bg.png') }}?v=5" style="width: 260px; height: auto; margin-top: -20px; margin-bottom: 0.5rem; filter: brightness(0.95);" alt="NeXa Robot">
        <h2 style="font-weight: 700; color: var(--text-dark); margin-bottom: 0.25rem;">Nexa Chat</h2>
        <p style="font-size: 0.9rem; font-style: italic;">Your smart AI study companion</p>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-section">
      <div class="input-wrap">
        <button class="input-add" id="plus-btn" aria-label="Add file">+</button>
        <textarea id="input-field" class="input-field" rows="1"
          placeholder="Ask NeXa anything..."></textarea>
        <input type="file" id="file-input" style="display: none;" />

        <button class="send-btn" id="send-btn">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

  </main>
</div>

<script>
/* ---------------- STATE ---------------- */
const inputField = document.getElementById("input-field");
const sendBtn = document.getElementById("send-btn");
const chatArea = document.getElementById("chat-area");
const plusBtn = document.getElementById("plus-btn");
const fileInput = document.getElementById("file-input");

let activeSessionId = null;
let busy = false;

/* ---------------- APPEND MESSAGE ---------------- */
function appendMsg(role, text, timestamp) {
  const welcome = document.getElementById("welcome-container");
  if (welcome) {
    welcome.remove();
  }

  const div = document.createElement("div");
  div.className = "msg-row " + role;

  // Basic markdown conversion for code blocks, bold text, and linebreaks
  let formattedText = text
    .replace(/\n/g, "<br>")
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/```([\s\S]*?)```/g, "<pre style='background: rgba(168,85,247,0.06); padding: 0.8rem; border-radius: 0.8rem; overflow-x: auto; font-family: monospace; margin: 0.5rem 0; border: 1px solid rgba(168,85,247,0.12); font-size: 0.85rem;'>$1</pre>");

  const timeStr = timestamp || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (role === "nexa" || role === "assistant") {
    div.innerHTML = `
      <div class="msg-avatar">N</div>
      <div style="display: flex; flex-direction: column; max-width: 70%; align-items: flex-start;">
        <div class="chat-bubble nexa-bubble" style="max-width: 100%;">${formattedText}</div>
        <span style="font-size: 0.72rem; color: var(--text-muted); margin-top: 0.25rem; margin-left: 0.25rem;">${timeStr}</span>
      </div>
    `;
  } else {
    div.innerHTML = `
      <div class="msg-avatar">U</div>
      <div style="display: flex; flex-direction: column; max-width: 70%; align-items: flex-end;">
        <div class="chat-bubble user-bubble" style="max-width: 100%;">${formattedText}</div>
        <span style="font-size: 0.72rem; color: var(--text-muted); margin-top: 0.25rem; margin-right: 0.25rem;">${timeStr}</span>
      </div>
    `;
  }

  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

/* ---------------- LOAD SESSION / INITIAL STATE ---------------- */
async function initChat() {
  const urlParams = new URLSearchParams(window.location.search);
  const sessionIdParam = urlParams.get("session_id");
  const initialQuery = urlParams.get("q");
  const actionParam = urlParams.get("action");

  if (sessionIdParam) {
    activeSessionId = sessionIdParam;
    chatArea.innerHTML = "<div style='text-align: center; color: var(--text-muted); font-style: italic; padding: 2rem;'>Loading chat history...</div>";
    try {
      const res = await fetch("/api/chat/" + activeSessionId);
      const data = await res.json();
      chatArea.innerHTML = "";
      if (data.success && data.messages.length > 0) {
        data.messages.forEach(msg => {
          appendMsg(msg.role, msg.content);
        });
      }
    } catch (err) {
      chatArea.innerHTML = "<div style='text-align: center; color: var(--text-muted); font-style: italic; padding: 2rem;'>⚠️ Error loading chat history.</div>";
    }
  } else if (initialQuery) {
    inputField.value = initialQuery;
    sendMessage();
  }

  if (actionParam === "upload") {
    const cleanUrl = window.location.pathname + (activeSessionId ? "?session_id=" + activeSessionId : "");
    window.history.replaceState(null, "", cleanUrl);
    fileInput.click();
  }

  loadSidebarRecentChats();
}

/* ---------------- SEND MESSAGE ---------------- */
async function sendMessage() {
  const text = inputField.value.trim();
  if (!text || busy) return;

  busy = true;
  sendBtn.disabled = true;

  appendMsg("user", text);
  inputField.value = "";

  try {
    const res = await fetch("/get", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, session_id: activeSessionId })
    });

    const data = await res.json();

    if (data.success) {
      if (!activeSessionId) {
        activeSessionId = data.session_id;
        window.history.replaceState(null, "", "/chat?session_id=" + activeSessionId);
        loadSidebarRecentChats();
      }
      appendMsg("nexa", data.response);
    } else {
      appendMsg("nexa", "⚠️ Error: " + (data.message || "Could not fetch response."));
    }

  } catch (err) {
    appendMsg("nexa", "⚠️ Server error. Please try again.");
  }

  busy = false;
  sendBtn.disabled = false;
}

/* ---------------- FILE UPLOAD ---------------- */
plusBtn.addEventListener("click", () => {
  fileInput.click();
});

fileInput.addEventListener("change", async () => {
  if (fileInput.files.length === 0 || busy) return;
  
  const file = fileInput.files[0];
  busy = true;
  sendBtn.disabled = true;
  
  const tempDiv = document.createElement("div");
  tempDiv.className = "msg-row nexa";
  tempDiv.innerHTML = `
    <div class="msg-avatar">N</div>
    <div class="bubble nexa-bubble">Uploading <strong>${file.name}</strong>...</div>
  `;
  
  const welcome = document.getElementById("welcome-container");
  if (welcome) {
    welcome.remove();
  }
  
  chatArea.appendChild(tempDiv);
  chatArea.scrollTop = chatArea.scrollHeight;

  const formData = new FormData();
  formData.append("file", file);
  if (activeSessionId) {
    formData.append("session_id", activeSessionId);
  }

  try {
    const res = await fetch("/upload", {
      method: "POST",
      body: formData
    });
    const data = await res.json();
    
    tempDiv.remove();

    if (data.success) {
      if (!activeSessionId) {
        activeSessionId = data.session_id;
        window.history.replaceState(null, "", "/chat?session_id=" + activeSessionId);
        loadSidebarRecentChats();
      }
      appendMsg("user", data.user_message);
      appendMsg("nexa", data.bot_response);
    } else {
      appendMsg("nexa", "⚠️ Upload failed: " + (data.message || "Unknown error."));
    }
  } catch (err) {
    tempDiv.remove();
    appendMsg("nexa", "⚠️ Connection error while uploading file.");
  }

  fileInput.value = "";
  busy = false;
  sendBtn.disabled = false;
});

/* ---------------- EVENTS ---------------- */
sendBtn.addEventListener("click", sendMessage);

inputField.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

initChat();

/* ---------------- SIDEBAR LOADER FUNCTIONS ---------------- */
async function loadSidebarRecentChats() {
  const sidebarList = document.getElementById("sidebarRecentList");
  if (!sidebarList) return;
  try {
    const res = await fetch("/api/recent_chats");
    const data = await res.json();
    if (data.success && data.chats.length > 0) {
      sidebarList.innerHTML = data.chats.slice(0, 5).map(c => {
        const isActive = c.id === activeSessionId;
        const bg = isActive ? 'rgba(168,85,247,0.1)' : 'rgba(168,85,247,0.03)';
        const color = isActive ? 'var(--purple)' : 'var(--text-mid)';
        const border = isActive ? '1px solid rgba(168,85,247,0.2)' : '1px solid rgba(168,85,247,0.05)';
        return `
          <div class="sidebar-chat-item ${isActive ? 'active-chat' : ''}" data-id="${c.id}" onclick="loadSession('${c.id}')" style="font-size: 0.8rem; padding: 0.45rem 0.6rem; border-radius: 0.6rem; cursor: pointer; color: ${color}; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: ${bg}; transition: background 0.2s, color 0.2s; border: ${border};" onmouseover="if(!this.classList.contains('active-chat')){this.style.background='rgba(168,85,247,0.08)';this.style.color='var(--purple)'}" onmouseout="if(!this.classList.contains('active-chat')){this.style.background='rgba(168,85,247,0.03)';this.style.color='var(--text-mid)'}">
            💬 ${escapeHTML(c.title)}
          </div>
        `;
      }).join("");
    } else {
      sidebarList.innerHTML = "<div style='font-size: 0.75rem; color: var(--text-muted); font-style: italic; padding: 0.5rem 0;'>No recent chats</div>";
    }
  } catch (err) {
    sidebarList.innerHTML = "<div style='font-size: 0.75rem; color: var(--text-muted); font-style: italic; padding: 0.5rem 0;'>Error loading</div>";
  }
}

async function loadSession(sessionId) {
  activeSessionId = sessionId;
  window.history.replaceState(null, "", "/chat?session_id=" + activeSessionId);
  
  // Highlight active session item in the sidebar in real-time
  document.querySelectorAll(".sidebar-chat-item").forEach(item => {
    if (item.getAttribute("data-id") === activeSessionId) {
      item.classList.add("active-chat");
      item.style.background = "rgba(168,85,247,0.1)";
      item.style.color = "var(--purple)";
      item.style.borderColor = "rgba(168,85,247,0.2)";
    } else {
      item.classList.remove("active-chat");
      item.style.background = "rgba(168,85,247,0.03)";
      item.style.color = "var(--text-mid)";
      item.style.borderColor = "rgba(168,85,247,0.05)";
    }
  });

  chatArea.innerHTML = "<div style='text-align: center; color: var(--text-muted); font-style: italic; padding: 2rem;'>Loading chat history...</div>";
  try {
    const res = await fetch("/api/chat/" + activeSessionId);
    const data = await res.json();
    chatArea.innerHTML = "";
    if (data.success && data.messages.length > 0) {
      data.messages.forEach(msg => {
        appendMsg(msg.role, msg.content, msg.timestamp);
      });
    }
  } catch (err) {
    chatArea.innerHTML = "<div style='text-align: center; color: var(--text-muted); font-style: italic; padding: 2rem;'>⚠️ Error loading chat history.</div>";
  }
}

function escapeHTML(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

// Dynamic Greeting Script
(function() {
  const greetingEl = document.getElementById("dynamicGreeting");
  if (greetingEl) {
    const hour = new Date().getHours();
    let greeting = "Good Morning 🌸";
    if (hour >= 12 && hour < 17) {
      greeting = "Good Afternoon ☀️";
    } else if (hour >= 17 && hour < 22) {
      greeting = "Good Evening 🌇";
    } else if (hour >= 22 || hour < 5) {
      greeting = "Good Night 🌙";
    }
    greetingEl.innerHTML = greeting;
  }
})();
</script>

<!-- Mobile Sidebar Toggle Script -->
<script>
  (function() {
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.createElement('div');
    overlay.className = 'sidebar-overlay';
    document.body.appendChild(overlay);

    if (menuToggle && sidebar) {
      menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
      });
    }
    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('active');
    });
  })();
</script>

</body>
</html>
