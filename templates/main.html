<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chat</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeXa – Smart Companion</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --pink-bg:     #fce8f0;
      --white-bg:    #ffffff;
      --purple:      #a855f7;
      --purple-light:#c084fc;
      --pink-btn:    #f9c8dc;
      --text-dark:   #1e1e2e;
      --text-mid:    #6b6b80;
      --text-muted:  #b0aec0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0e8f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

  
    .app-shell {
      display: flex;
      width: 980px;
      height: 610px;
      border-radius: 2.2rem;
      overflow: hidden;
      box-shadow: 0 28px 72px rgba(168,85,247,.22);
      background: var(--white-bg);
    }

  
    .sidebar {
      width: 225px;
      background: var(--pink-bg);
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      flex-shrink: 0;
    }

    .logo {
      display: flex; align-items: center; gap: .55rem;
      margin-bottom: 2.5rem;
    }
    .logo img {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      object-fit: cover;
    }

    .logo-icon {
      width: 40px; height: 40px; border-radius: 11px;
      background: linear-gradient(135deg, #f472b6, #a855f7);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.35rem; color: #fff; font-style: italic;
    }

    .logo-text { font-size: 1.3rem; font-weight: 800; color: var(--text-dark); }

    .nav { list-style: none; display: flex; flex-direction: column; gap: .3rem; flex-shrink: 0; }
    .nav-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem .9rem; border-radius: .75rem;
      font-size: .95rem; font-weight: 600; color: var(--text-mid);
      cursor: pointer; transition: background .2s, color .2s;
      position: relative;
    }
    .nav-item:hover { background: rgba(168,85,247,.08); color: var(--purple); }
    .nav-item.active { color: var(--purple); }
    .nav-item.active::after {
      content: ''; position: absolute; right: -1.5rem; top: 50%;
      transform: translateY(-50%); width: 3px; height: 60%;
      background: var(--purple); border-radius: 4px;
    }
    .nav-icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }

    .profile {
      display: flex; align-items: center; gap: .75rem;
      margin-top: auto; padding-top: 1.5rem;
    }
    .profile-label { font-weight: 700; font-size: .95rem; color: var(--text-dark); }
    .avatar { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }

  
    .main {
      flex: 1;
      display: flex; flex-direction: column;
      padding: 2rem 2.5rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .topbar {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: auto;
    }
    .greeting-title {
      font-size: .72rem; font-weight: 800;
      letter-spacing: .12em; text-transform: uppercase; color: var(--text-dark);
    }
    .greeting-sub { font-size: .8rem; color: var(--text-muted); margin-top: .1rem; font-style: italic; }

    .logout-btn {
      display: flex; align-items: center; gap: .45rem;
      background: none; border: none; cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: .9rem; font-weight: 700; color: var(--text-mid);
      transition: color .2s;
    }
    .logout-btn:hover { color: var(--purple); }
    .logout-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }


.hero-section{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  margin-top:-70px;
  position:relative;
  z-index:1;
}

.bottom-text{
  font-family:'DM Serif Display', serif;
  font-size:30px;
  font-weight:500px;
  color:#222;
  line-height:1.2;
}

.bottom-text{
  margin-top: -110px;
  margin-right: 260px;
  text-align: left;
}

.hero-image{
  width:490px;
  height:auto;
  object-fit:contain;
  margin-top:-20px;
  
  opacity:0.60;

  filter:
  brightness(0.92)
  saturate(0.85);

  transition:.3s ease;
}

.hero-image:hover{
  opacity:0.9;
  transform:scale(1.03);
}


.eye{
  position: absolute;
  width: 10px;
  height: 15px;
  background: #181818;
  border-radius: 50%;
  z-index: 999;
  transition: transform .08s ease-out;
}
.eye-left{
  top: 60px;
  left: 365px;
}
.eye-right{
  top: 60px;
  right: 335px;
}

    

    .input-wrap {
      position: relative; z-index: 1;
      background: #fff; border: 1.5px solid #ede9f6; border-radius: 1.5rem;
      padding: 1rem 1rem 1rem 1.2rem;
      display: flex; align-items: center; gap: .75rem;
      box-shadow: 0 8px 32px rgba(168,85,247,.10);
      margin-bottom: 1.2rem;
    }
    .input-add {
      width: 28px; height: 28px; border: none; background: none; cursor: pointer;
      color: var(--text-muted); font-size: 1.4rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: color .2s;
    }
    .input-add:hover { color: var(--purple); }
    .input-field {
      flex: 1; border: none; outline: none;
      font-family: 'Nunito', sans-serif; font-size: .95rem;
      color: var(--text-dark); background: transparent;
    }
    .input-field::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, #c084fc, #a855f7);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(168,85,247,.35);
      transition: transform .15s, box-shadow .15s;
    }
    .send-btn:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(168,85,247,.5); }
    .send-btn svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.5; }

    .action-pills { position: relative; z-index: 1; display: flex; gap: .75rem; }
    .pill {
      flex: 1; padding: .78rem .5rem;
      background: var(--pink-btn); border: none; border-radius: 3rem;
      font-family: 'Nunito', sans-serif; font-size: .85rem; font-weight: 700;
      color: var(--text-dark); cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: .42rem;
      transition: background .2s, transform .15s;
    }
    .pill:hover { background: #f5aece; transform: translateY(-2px); }
    .pill svg { width: 16px; height: 16px; stroke: var(--text-dark); fill: none; stroke-width: 1.8; flex-shrink: 0; }
  </style>
</head>
<body>
  

<div class="app-shell">

  <aside class="sidebar">
     <div class="logo">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="NeXa Logo">
      <span class="logo-text">NeXa</span>
    </div>
    

    <ul class="nav">
      <li class="nav-item active" onclick="window.location.href='/main'">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
        Home
      </li>
      <li class="nav-item" onclick="window.location.href='/chat'">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        New Chat
      </li>
      <li class="nav-item" onclick="window.location.href='/project'">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <rect x="4" y="2" width="16" height="20" rx="2"/>
          <line x1="8" y1="6" x2="16" y2="6"/>
          <line x1="8" y1="10" x2="16" y2="10"/>
          <line x1="8" y1="14" x2="12" y2="14"/>
        </svg>
        Project
      </li>
      <li class="nav-item" onclick="window.location.href='/recent'">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        Recent
      </li>
    </ul>

    <div class="profile" style="display: flex; flex-direction: column; align-items: flex-start; gap: 0.25rem;">
      <span class="profile-label" style="font-size: 0.8rem; color: var(--text-muted);">Profile</span>
      <div style="display: flex; align-items: center; gap: 0.5rem; width: 100%;">
        <div class="avatar">
          <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="36" fill="#f472b6"/>
            <circle cx="18" cy="14" r="7" fill="white" fill-opacity=".9"/>
            <path d="M4 34c0-7.732 6.268-14 14-14s14 6.268 14 14" fill="white" fill-opacity=".9"/>
          </svg>
        </div>
        <span class="profile-email" style="font-weight: 600; font-size: 0.8rem; color: var(--text-dark); word-break: break-all; max-width: 130px;" title="{{ session.get('user_email', 'Guest') }}">{{ session.get('user_email', 'Guest') }}</span>
      </div>
    </div>
  </aside>


  <main class="main">

  
    <div class="topbar">
      <div>
        <div class="greeting-title" id="dynamicGreeting">Good Morning 🌸</div>
        <div class="greeting-sub">Ready to make today productive?</div>
      </div>
    
      <button class="logout-btn" onclick="window.location.href='/logout'">
        <svg viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>

    <div class="hero-section">

  <div class="robot-wrap">
   <img src="{{ url_for('static', filename='images/bg.png') }}" class="hero-image">

    <div class="eye eye-left"></div>
    <div class="eye eye-right"></div>
  </div>

  <div class="hero-text">
    <h1 class="bottom-text">
      <span>Hey buddy!</span><br>
      <span>How can I help you?</span>
    </h1>
  </div>


    </div>
    
    
    <div class="input-wrap">
      <button class="input-add" aria-label="Add">+</button>
      <input class="input-field" type="text" placeholder="Ask NeXa anything....." aria-label="Chat input"/>
      <button class="send-btn" aria-label="Send"onclick="goToChat()">
        <svg viewBox="0 0 24 24">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>

    
    <div class="action-pills">

      <button class="pill" onclick="window.location.href='/chat?q=generate image'">
      
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        Create image
      </button>

      <button class="pill" onclick="window.location.href='/recent'">
      
        <svg viewBox="0 0 24 24">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        write or edit
      </button>

      <button class="pill" onclick="window.location.href='/project'">
      
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10A15.3 15.3 0 0112 2z"/>
        </svg>
        look something up
      </button>

    </div>

  </main>

</div>
<script>
  const eyes = document.querySelectorAll(".eye");
  
  document.addEventListener("mousemove", (e) => {
  
    eyes.forEach((eye) => {
  
      const rect = eye.getBoundingClientRect();
  
      const eyeCenterX =
        rect.left + rect.width / 2;
  
      const eyeCenterY =
        rect.top + rect.height / 2;
  
      const deltaX =
        e.clientX - eyeCenterX;
  
      const deltaY =
        e.clientY - eyeCenterY;

      const moveX =
        Math.max(-3,
        Math.min(3, deltaX / 25));
  
      const moveY =
        Math.max(-3,
        Math.min(3, deltaY / 25));
  
      eye.style.transform = `translate(${moveX}px, ${moveY}px)`;
    });
  
  });

    </script>

    <script>
    function goToChat() {
      const q = document.querySelector(".input-field").value.trim();
      if (q) {
        window.location.href = "/chat?q=" + encodeURIComponent(q);
      } else {
        window.location.href = "/chat";
      }
    }

    // Trigger chat on Enter keypress
    document.querySelector(".input-field").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        goToChat();
      }
    });

    // Plus button redirects to chat page with upload action
    document.querySelector(".input-add").addEventListener("click", () => {
      window.location.href = "/chat?action=upload";
    });
    </script>

    <!-- Dynamic Greeting Script -->
    <script>
    (function() {
      const greetingEl = document.getElementById("dynamicGreeting");
      if (greetingEl) {
        const hour = new Date().getHours();
        let greeting = "Good Morning 🌸";
        if (hour >= 12 && hour < 17) {
          greeting = "Good Afternoon ☀️";
        } else if (hour >= 17 && hour < 22) {
          greeting = "Good Evening 🌇";
        } else if (hour >= 22 || hour < 5) {
          greeting = "Good Night 🌙";
        }
        greetingEl.innerHTML = greeting;
      }
    })();
    </script>

    <!-- JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
