<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chat</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeXa – Smart Companion</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0e8f5;
    }
  </style>
</head>
<body>
  

<div class="app-shell">

  <aside class="sidebar">
     <div class="logo">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="NeXa Logo">
      <span class="logo-text">NeXa</span>
    </div>
    

    <ul class="nav">
      <li class="nav-item active" onclick="window.location.href='/main'">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
        Home
      </li>
      <li class="nav-item" onclick="window.location.href='/chat'">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        New Chat
      </li>
      <li class="nav-item" onclick="window.location.href='/project'">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <rect x="4" y="2" width="16" height="20" rx="2"/>
          <line x1="8" y1="6" x2="16" y2="6"/>
          <line x1="8" y1="10" x2="16" y2="10"/>
          <line x1="8" y1="14" x2="12" y2="14"/>
        </svg>
        Project
      </li>
      <li class="nav-item" onclick="window.location.href='/recent'">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        Recent
      </li>
    </ul>

    <div class="profile" style="display: flex; flex-direction: column; align-items: flex-start; gap: 0.25rem;">
      <span class="profile-label" style="font-size: 0.8rem; color: var(--text-muted);">Profile</span>
      <div style="display: flex; align-items: center; gap: 0.5rem; width: 100%;">
        <div class="avatar">
          <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
            <rect width="36" height="36" fill="#f472b6"/>
            <circle cx="18" cy="14" r="7" fill="white" fill-opacity=".9"/>
            <path d="M4 34c0-7.732 6.268-14 14-14s14 6.268 14 14" fill="white" fill-opacity=".9"/>
          </svg>
        </div>
        <span class="profile-email" style="font-weight: 600; font-size: 0.8rem; color: var(--text-dark); word-break: break-all; max-width: 130px;" title="{{ session.get('user_email', 'Guest') }}">{{ session.get('user_email', 'Guest') }}</span>
      </div>
    </div>
  </aside>


  <main class="main">

  
    <div class="topbar">
      <div style="display: flex; align-items: center; gap: 0.5rem;">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Menu"><i class="fas fa-bars"></i></button>
        <div>
          <div class="greeting-title" id="dynamicGreeting">Good Morning 🌸</div>
          <div class="greeting-sub">Ready to make today productive?</div>
        </div>
      </div>
    
      <button class="logout-btn" onclick="window.location.href='/logout'">
        <svg viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>

    <div class="hero-section">

  <div class="robot-wrap">
   <img src="{{ url_for('static', filename='images/bg.png') }}?v=8" class="hero-image">

    <div class="eye eye-left"></div>
    <div class="eye eye-right"></div>
  </div>

  <div class="hero-text">
    <h1 class="bottom-text">
      <span>Hey buddy !!!</span><br>
      <span>What would you like to know today?</span>
    </h1>
  </div>


    </div>
    
    
    <div class="input-wrap">
      <button class="input-add" aria-label="Add">+</button>
      <input class="input-field" type="text" placeholder="Ask NeXa anything....." aria-label="Chat input"/>
      <button class="send-btn" aria-label="Send"onclick="goToChat()">
        <svg viewBox="0 0 24 24">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>

    
    <div class="action-pills">

      <button class="pill" onclick="window.location.href='/chat?q=generate image'">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        Create image
      </button>

      <button class="pill" onclick="window.location.href='/recent'">
        <svg viewBox="0 0 24 24">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        write or edit
      </button>

      <button class="pill" onclick="window.location.href='/project'">
        <svg viewBox="0 0 24 24">
          <rect x="4" y="2" width="16" height="20" rx="2"/>
          <line x1="8" y1="6" x2="16" y2="6"/>
          <line x1="8" y1="10" x2="16" y2="10"/>
          <line x1="8" y1="14" x2="12" y2="14"/>
        </svg>
        Project Analyze
      </button>

    </div>

  </main>

</div>
<script>
  const robotWrap = document.querySelector(".robot-wrap");
  const eyeLeft = document.querySelector(".eye-left");
  const eyeRight = document.querySelector(".eye-right");

  document.addEventListener("mousemove", (e) => {
    if (!robotWrap || !eyeLeft || !eyeRight) return;
    const rect = robotWrap.getBoundingClientRect();
    
    // Left eye static center in viewport
    const leftCenterX = rect.left + rect.width * 0.398104;
    const leftCenterY = rect.top + rect.height * 0.280498;
    
    // Right eye static center in viewport
    const rightCenterX = rect.left + rect.width * 0.644966;
    const rightCenterY = rect.top + rect.height * 0.264651;

    // Left eye delta
    const dxLeft = e.clientX - leftCenterX;
    const dyLeft = e.clientY - leftCenterY;
    const moveXLeft = Math.max(-3, Math.min(3, dxLeft / 25));
    const moveYLeft = Math.max(-3, Math.min(3, dyLeft / 25));
    eyeLeft.style.transform = `translate(${moveXLeft}px, ${moveYLeft}px)`;

    // Right eye delta
    const dxRight = e.clientX - rightCenterX;
    const dyRight = e.clientY - rightCenterY;
    const moveXRight = Math.max(-3, Math.min(3, dxRight / 25));
    const moveYRight = Math.max(-3, Math.min(3, dyRight / 25));
    eyeRight.style.transform = `translate(${moveXRight}px, ${moveYRight}px)`;
  });
</script>

    <script>
    function goToChat() {
      const q = document.querySelector(".input-field").value.trim();
      if (q) {
        window.location.href = "/chat?q=" + encodeURIComponent(q);
      } else {
        window.location.href = "/chat";
      }
    }

    // Trigger chat on Enter keypress
    document.querySelector(".input-field").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        goToChat();
      }
    });

    // Plus button redirects to chat page with upload action
    document.querySelector(".input-add").addEventListener("click", () => {
      window.location.href = "/chat?action=upload";
    });
    </script>

    <!-- Dynamic Greeting Script -->
    <script>
    (function() {
      const greetingEl = document.getElementById("dynamicGreeting");
      if (greetingEl) {
        const hour = new Date().getHours();
        let greeting = "Good Morning 🌸";
        if (hour >= 12 && hour < 17) {
          greeting = "Good Afternoon ☀️";
        } else if (hour >= 17 && hour < 22) {
          greeting = "Good Evening 🌇";
        } else if (hour >= 22 || hour < 5) {
          greeting = "Good Night 🌙";
        }
        greetingEl.innerHTML = greeting;
      }
    })();
    </script>

    <!-- JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <!-- Mobile Sidebar Toggle Script -->
    <script>
      (function() {
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.createElement('div');
        overlay.className = 'sidebar-overlay';
        document.body.appendChild(overlay);

        if (menuToggle && sidebar) {
          menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
          });
        }
        overlay.addEventListener('click', () => {
          sidebar.classList.remove('open');
          overlay.classList.remove('active');
        });
      })();
    </script>
</body>
</html>
